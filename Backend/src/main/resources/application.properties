spring.application.name=job-matching-platform
server.port=8080

# Datasource - MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/jobmatch?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=25
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# SQL Init
spring.sql.init.mode=always

# Multipart
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# App Config
app.matching.weight-skill=0.6
app.matching.weight-gpa=0.2
app.matching.weight-auth=0.2
app.upload.resume-dir=./uploads/resumes
app.cors.allowed-origin=http://localhost:4200
