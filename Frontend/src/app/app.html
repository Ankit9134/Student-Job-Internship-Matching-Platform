<div class="min-h-screen bg-gradient-to-br from-slate-50 via-white to-indigo-50/30 font-sans">

  <header *ngIf="auth.isLoggedIn()" class="bg-white/80 backdrop-blur-md border-b border-slate-200/60 sticky top-0 z-50 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6">
      <div class="flex items-center justify-between h-15">

        <!-- Logo -->
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-xl flex items-center justify-center shadow-sm">
            <svg lucideGraduationCap class="text-white w-4 h-4"></svg>
          </div>
          <span class="text-base font-bold text-slate-900 tracking-tight">JobMatch</span>
        </div>

        <!-- Desktop Nav -->
        <nav class="hidden md:flex gap-1">
          <ng-container *ngIf="auth.isStudent()">
            <a routerLink="/profile" routerLinkActive="bg-indigo-600 text-white shadow-sm"
               class="flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">
              <svg lucideUser class="w-4 h-4"></svg> Profile
            </a>
            <a routerLink="/matches" routerLinkActive="bg-indigo-600 text-white shadow-sm"
               class="flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">
              <svg lucideSparkles class="w-4 h-4"></svg> Matches
            </a>
            <a routerLink="/applications" routerLinkActive="bg-indigo-600 text-white shadow-sm"
               class="flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">
              <svg lucideClipboardList class="w-4 h-4"></svg> Applications
            </a>
          </ng-container>
          <ng-container *ngIf="auth.isRecruiter()">
            <a routerLink="/admin" routerLinkActive="bg-indigo-600 text-white shadow-sm"
               class="flex items-center gap-1.5 px-3.5 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 transition-all">
              <svg lucideWrench class="w-4 h-4"></svg> Dashboard
            </a>
          </ng-container>
        </nav>

        <!-- Right -->
        <div class="flex items-center gap-3">
          <div class="hidden sm:flex items-center gap-2.5 bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5">
            <div class="w-6 h-6 bg-gradient-to-br from-indigo-400 to-violet-500 rounded-lg flex items-center justify-center">
              <span class="text-white text-xs font-bold">{{ auth.getFullName()?.charAt(0) }}</span>
            </div>
            <div class="text-right">
              <p class="text-xs font-semibold text-slate-700 leading-tight">{{ auth.getFullName() }}</p>
              <p class="text-xs text-indigo-500 font-medium capitalize">{{ auth.getRole()?.toLowerCase() }}</p>
            </div>
          </div>
          <button (click)="auth.logout()"
                  class="hidden md:flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold rounded-xl border border-slate-200 text-slate-600 hover:bg-red-50 hover:border-red-200 hover:text-red-600 transition">
            <svg lucideLogOut class="w-3.5 h-3.5"></svg> Sign Out
          </button>
          <button (click)="toggleMenu()" class="md:hidden p-2 rounded-xl text-slate-600 hover:bg-slate-100 transition">
            <svg *ngIf="!mobileMenuOpen()" lucideMenu class="w-5 h-5"></svg>
            <svg *ngIf="mobileMenuOpen()" lucideX class="w-5 h-5"></svg>
          </button>
        </div>
      </div>

      <!-- Mobile Menu -->
      <div *ngIf="mobileMenuOpen()" class="md:hidden border-t border-slate-100 py-3 flex flex-col gap-1">
        <ng-container *ngIf="auth.isStudent()">
          <a routerLink="/profile" routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
             (click)="closeMenu()"
             class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm text-slate-700 hover:bg-slate-100 transition">
            <svg lucideUser class="w-4 h-4"></svg> Profile
          </a>
          <a routerLink="/matches" routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
             (click)="closeMenu()"
             class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm text-slate-700 hover:bg-slate-100 transition">
            <svg lucideSparkles class="w-4 h-4"></svg> Matches
          </a>
          <a routerLink="/applications" routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
             (click)="closeMenu()"
             class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm text-slate-700 hover:bg-slate-100 transition">
            <svg lucideClipboardList class="w-4 h-4"></svg> Applications
          </a>
        </ng-container>
        <ng-container *ngIf="auth.isRecruiter()">
          <a routerLink="/admin" routerLinkActive="bg-indigo-50 text-indigo-700 font-semibold"
             (click)="closeMenu()"
             class="flex items-center gap-2 px-3 py-2.5 rounded-xl text-sm text-slate-700 hover:bg-slate-100 transition">
            <svg lucideWrench class="w-4 h-4"></svg> Dashboard
          </a>
        </ng-container>
        <div class="border-t border-slate-100 mt-2 pt-2 flex items-center justify-between px-1">
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 bg-gradient-to-br from-indigo-400 to-violet-500 rounded-lg flex items-center justify-center">
              <span class="text-white text-xs font-bold">{{ auth.getFullName()?.charAt(0) }}</span>
            </div>
            <div>
              <p class="text-xs font-semibold text-slate-700">{{ auth.getFullName() }}</p>
              <p class="text-xs text-indigo-500">{{ auth.getRole() }}</p>
            </div>
          </div>
          <button (click)="auth.logout()"
                  class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-sm text-red-600 hover:bg-red-50 transition">
            <svg lucideLogOut class="w-4 h-4"></svg> Sign Out
          </button>
        </div>
      </div>
    </div>
  </header>

  <main [class]="auth.isLoggedIn() ? 'max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-8' : ''">
    <router-outlet />
  </main>

</div>
