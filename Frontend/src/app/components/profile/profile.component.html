<h2>My Profile</h2>
<p class="hint">Keep this up to date — your matches recalculate automatically whenever you save.</p>

<form [formGroup]="profileForm" (ngSubmit)="save()" class="profile-form">

  <div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" formControlName="email" />
    <small class="error" *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.invalid">
      A valid email is required.
    </small>
  </div>

  <div class="field">
    <label for="fullName">Full name</label>
    <input id="fullName" type="text" formControlName="fullName" />
  </div>

  <div class="field-row">
    <div class="field">
      <label for="gpa">GPA</label>
      <input id="gpa" type="number" step="0.01" min="0" max="4" formControlName="gpa" />
    </div>
    <div class="field">
      <label for="gradYear">Graduation year</label>
      <input id="gradYear" type="number" formControlName="gradYear" />
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label for="workAuthStatus">Work authorization status</label>
      <select id="workAuthStatus" formControlName="workAuthStatus">
        <option value="CITIZEN">U.S. Citizen</option>
        <option value="PERM_RESIDENT">Permanent Resident</option>
        <option value="F1_OPT">F-1 / OPT</option>
        <option value="H1B_NEEDED">Needs H-1B</option>
        <option value="OTHER">Other</option>
      </select>
    </div>
    <div class="field checkbox-field">
      <label>
        <input type="checkbox" formControlName="needsSponsorship" />
        I will need visa sponsorship
      </label>
    </div>
  </div>

  <div class="field-row">
    <div class="field">
      <label for="preferredWorkMode">Preferred work mode</label>
      <select id="preferredWorkMode" formControlName="preferredWorkMode">
        <option value="ANY">Any</option>
        <option value="REMOTE">Remote</option>
        <option value="ONSITE">Onsite</option>
        <option value="HYBRID">Hybrid</option>
      </select>
    </div>
    <div class="field">
      <label for="preferredLocations">Preferred locations</label>
      <input id="preferredLocations" type="text" placeholder="e.g. Remote, New York, Austin"
             formControlName="preferredLocations" />
    </div>
  </div>

  <div class="field">
    <label>Skills</label>
    <div class="skill-chips">
      <button type="button" *ngFor="let skill of allSkills"
              class="chip" [class.selected]="isSkillSelected(skill.id)"
              (click)="toggleSkill(skill.id)">
        {{ skill.name }}
      </button>
    </div>
    <small class="hint">Tap to select or deselect. This drives your skill-match score.</small>
  </div>

  <div class="field">
    <label for="resume">Resume</label>
    <input id="resume" type="file" accept=".pdf,.doc,.docx" (change)="onResumeSelected($event)" />
  </div>

  <div class="actions">
    <button type="submit" [disabled]="saving">{{ saving ? 'Saving...' : 'Save profile' }}</button>
    <span class="save-message" *ngIf="saveMessage">{{ saveMessage }}</span>
  </div>
</form>
