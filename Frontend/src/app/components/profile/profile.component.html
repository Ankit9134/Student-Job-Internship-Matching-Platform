<h2 class="text-2xl font-bold text-gray-900 mb-1">My Profile</h2>
<p class="text-sm text-gray-500 mb-6">Keep this up to date — your matches recalculate automatically whenever you save.</p>

<form [formGroup]="profileForm" (ngSubmit)="save()" class="flex flex-col gap-5 max-w-2xl">

  <div class="flex flex-col gap-1">
    <label for="email" class="text-sm font-semibold text-gray-700">Email</label>
    <input id="email" type="email" formControlName="email"
           class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
    <small class="text-red-600 text-xs" *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.invalid">
      A valid email is required.
    </small>
  </div>

  <div class="flex flex-col gap-1">
    <label for="fullName" class="text-sm font-semibold text-gray-700">Full name</label>
    <input id="fullName" type="text" formControlName="fullName"
           class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
  </div>

  <div class="flex gap-4">
    <div class="flex flex-col gap-1 flex-1">
      <label for="gpa" class="text-sm font-semibold text-gray-700">GPA</label>
      <input id="gpa" type="number" step="0.01" min="0" max="4" formControlName="gpa"
             class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
    </div>
    <div class="flex flex-col gap-1 flex-1">
      <label for="gradYear" class="text-sm font-semibold text-gray-700">Graduation year</label>
      <input id="gradYear" type="number" formControlName="gradYear"
             class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
    </div>
  </div>

  <div class="flex gap-4">
    <div class="flex flex-col gap-1 flex-1">
      <label for="workAuthStatus" class="text-sm font-semibold text-gray-700">Work authorization status</label>
      <select id="workAuthStatus" formControlName="workAuthStatus"
              class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
        <option value="CITIZEN">U.S. Citizen</option>
        <option value="PERM_RESIDENT">Permanent Resident</option>
        <option value="F1_OPT">F-1 / OPT</option>
        <option value="H1B_NEEDED">Needs H-1B</option>
        <option value="OTHER">Other</option>
      </select>
    </div>
    <div class="flex items-center gap-2 flex-1 pt-6">
      <input type="checkbox" id="needsSponsorship" formControlName="needsSponsorship"
             class="w-4 h-4 accent-gray-900" />
      <label for="needsSponsorship" class="text-sm text-gray-700">I will need visa sponsorship</label>
    </div>
  </div>

  <div class="flex gap-4">
    <div class="flex flex-col gap-1 flex-1">
      <label for="preferredWorkMode" class="text-sm font-semibold text-gray-700">Preferred work mode</label>
      <select id="preferredWorkMode" formControlName="preferredWorkMode"
              class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
        <option value="ANY">Any</option>
        <option value="REMOTE">Remote</option>
        <option value="ONSITE">Onsite</option>
        <option value="HYBRID">Hybrid</option>
      </select>
    </div>
    <div class="flex flex-col gap-1 flex-1">
      <label for="preferredLocations" class="text-sm font-semibold text-gray-700">Preferred locations</label>
      <input id="preferredLocations" type="text" placeholder="e.g. Remote, New York, Austin"
             formControlName="preferredLocations"
             class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
    </div>
  </div>

  <div class="flex flex-col gap-2">
    <label class="text-sm font-semibold text-gray-700">Skills</label>
    <div class="flex flex-wrap gap-2">
      <button type="button" *ngFor="let skill of allSkills"
              (click)="toggleSkill(skill.id)"
              [class]="isSkillSelected(skill.id)
                ? 'px-3 py-1.5 rounded-full text-sm font-medium bg-gray-900 text-white border border-gray-900 cursor-pointer transition-all'
                : 'px-3 py-1.5 rounded-full text-sm font-medium bg-white text-gray-700 border border-gray-300 hover:border-gray-500 cursor-pointer transition-all'">
        {{ skill.name }}
      </button>
    </div>
    <small class="text-xs text-gray-500">Tap to select or deselect. This drives your skill-match score.</small>
  </div>

  <div class="flex flex-col gap-1">
    <label for="resume" class="text-sm font-semibold text-gray-700">Resume</label>
    <input id="resume" type="file" accept=".pdf,.doc,.docx" (change)="onResumeSelected($event)"
           class="text-sm text-gray-600 file:mr-3 file:py-1.5 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-gray-900 file:text-white hover:file:bg-gray-700 cursor-pointer" />
  </div>

  <div class="flex items-center gap-4 mt-2">
    <button type="submit" [disabled]="saving"
            class="px-5 py-2 bg-gray-900 text-white text-sm font-semibold rounded-lg hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
      {{ saving ? 'Saving...' : 'Save profile' }}
    </button>
    <span class="text-sm text-emerald-600" *ngIf="saveMessage">{{ saveMessage }}</span>
  </div>

</form>
