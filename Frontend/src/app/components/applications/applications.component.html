<h2 class="text-2xl font-bold text-gray-900 mb-5">My Applications</h2>

<p *ngIf="loading" class="text-sm text-gray-500">Loading...</p>
<p *ngIf="!loading && applications.length === 0" class="text-sm text-gray-500">
  You haven't marked any listings as applied yet — do that from the Matches tab.
</p>

<div class="overflow-x-auto rounded-xl border border-gray-200 shadow-sm" *ngIf="!loading && applications.length > 0">
  <table class="w-full text-sm border-collapse">
    <thead class="bg-gray-50">
      <tr>
        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Role</th>
        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Company</th>
        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Applied</th>
        <th class="text-left px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Status</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-100 bg-white">
      <tr *ngFor="let app of applications" class="hover:bg-gray-50 transition-colors">
        <td class="px-4 py-3 font-medium text-gray-900">{{ app.listingTitle }}</td>
        <td class="px-4 py-3 text-gray-600">{{ app.companyName }}</td>
        <td class="px-4 py-3 text-gray-500">{{ app.appliedAt | date:'mediumDate' }}</td>
        <td class="px-4 py-3">
          <select [value]="app.status" (change)="updateStatus(app, $any($event.target).value)"
                  [class]="'px-2 py-1 rounded-lg border text-xs font-semibold focus:outline-none ' +
                    (app.status === 'APPLIED' ? 'border-blue-200 text-blue-600 bg-blue-50' :
                     app.status === 'INTERVIEWING' ? 'border-amber-200 text-amber-600 bg-amber-50' :
                     app.status === 'OFFER' ? 'border-emerald-200 text-emerald-600 bg-emerald-50' :
                     'border-red-200 text-red-600 bg-red-50')">
            <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
          </select>
        </td>
      </tr>
    </tbody>
  </table>
</div>
