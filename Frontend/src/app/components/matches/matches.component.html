<div>
  <!-- Page Header -->
  <div class="mb-6">
    <h2 class="text-2xl font-bold text-slate-900">Your Matches</h2>
    <p class="text-sm text-slate-500 mt-1">Ranked by how well each role fits your profile.</p>
  </div>

  <!-- Filters Card -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-4 mb-4">
    <form [formGroup]="filterForm" class="grid grid-cols-2 gap-3 sm:grid-cols-4">
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Role</label>
        <input type="text" placeholder="e.g. Frontend, Data" formControlName="role"
               class="px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Location</label>
        <input type="text" placeholder="e.g. New York" formControlName="location"
               class="px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Work Mode</label>
        <select formControlName="workMode"
                class="px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition bg-white">
          <option value="">Any mode</option>
          <option value="REMOTE">🏠 Remote</option>
          <option value="ONSITE">🏢 Onsite</option>
          <option value="HYBRID">🔀 Hybrid</option>
        </select>
      </div>
      <div class="flex flex-col gap-1">
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Sponsorship</label>
        <select formControlName="sponsorshipNeeded"
                class="px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition bg-white">
          <option [ngValue]="null">Any</option>
          <option [ngValue]="true">✅ Required</option>
          <option [ngValue]="false">❌ Not needed</option>
        </select>
      </div>
    </form>
  </div>

  <!-- Sort + Results Count -->
  <div class="flex items-center justify-between mb-4">
    <p class="text-sm text-slate-500">
      <span *ngIf="!loading">{{ matches.length }} result(s)</span>
    </p>
    <div class="flex items-center gap-2">
      <span class="text-xs text-slate-500 font-medium">Sort:</span>
      <button type="button" (click)="setSort('score')"
              [class]="sort === 'score'
                ? 'px-3 py-1.5 rounded-xl bg-indigo-600 text-white text-xs font-semibold shadow-sm'
                : 'px-3 py-1.5 rounded-xl border border-slate-300 bg-white text-xs font-medium text-slate-600 hover:bg-slate-50'">
        ✨ Best Match
      </button>
      <button type="button" (click)="setSort('recent')"
              [class]="sort === 'recent'
                ? 'px-3 py-1.5 rounded-xl bg-indigo-600 text-white text-xs font-semibold shadow-sm'
                : 'px-3 py-1.5 rounded-xl border border-slate-300 bg-white text-xs font-medium text-slate-600 hover:bg-slate-50'">
        🕐 Most Recent
      </button>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="loading" class="flex flex-col gap-3">
    <div *ngFor="let i of [1,2,3]" class="bg-white rounded-2xl border border-slate-200 p-5 animate-pulse">
      <div class="h-4 bg-slate-200 rounded w-1/3 mb-2"></div>
      <div class="h-3 bg-slate-100 rounded w-1/4 mb-4"></div>
      <div class="flex gap-2">
        <div class="h-5 bg-slate-100 rounded-full w-16"></div>
        <div class="h-5 bg-slate-100 rounded-full w-20"></div>
      </div>
    </div>
  </div>

  <!-- Error State -->
  <div *ngIf="error" class="bg-red-50 border border-red-200 rounded-2xl p-4 text-sm text-red-600">
    ⚠️ {{ error }}
  </div>

  <!-- Empty State -->
  <div *ngIf="!loading && !error && matches.length === 0"
       class="bg-white rounded-2xl border border-slate-200 p-12 text-center">
    <div class="text-4xl mb-3">🔍</div>
    <p class="text-slate-700 font-semibold mb-1">No matches found</p>
    <p class="text-sm text-slate-400">Try widening your filters or updating your profile with more skills.</p>
  </div>

  <!-- Match Cards -->
  <div *ngIf="!loading" class="flex flex-col gap-3">
    <app-match-card
      *ngFor="let match of matches"
      [match]="match"
      [alreadyApplied]="appliedListingIds.has(match.listingId)"
      (applyClicked)="onApply($event)">
    </app-match-card>
  </div>

  <!-- Pagination -->
  <div class="flex items-center justify-center gap-4 mt-6 text-sm" *ngIf="totalPages > 1">
    <button (click)="prevPage()" [disabled]="page === 0"
            class="px-4 py-2 border border-slate-300 rounded-xl bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition text-sm font-medium">
      ← Previous
    </button>
    <span class="text-slate-500 text-sm">Page {{ page + 1 }} of {{ totalPages }}</span>
    <button (click)="nextPage()" [disabled]="page + 1 >= totalPages"
            class="px-4 py-2 border border-slate-300 rounded-xl bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition text-sm font-medium">
      Next →
    </button>
  </div>

</div>
