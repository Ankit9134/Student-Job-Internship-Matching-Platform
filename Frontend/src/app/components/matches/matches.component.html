<div>
  <!-- Page Header -->
  <div class="mb-6">
    <div class="flex items-center gap-3 mb-1">
      <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-sm">
        <lucide-icon [img]="TrendingUpIcon" [size]="16" class="text-white"></lucide-icon>
      </div>
      <h2 class="text-xl sm:text-2xl font-bold text-slate-900">Your Matches</h2>
    </div>
    <p class="text-sm text-slate-500 ml-12">Ranked by how well each role fits your profile.</p>
  </div>

  <!-- Filters -->
  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden mb-4">
    <div class="px-5 py-3.5 border-b border-slate-100 bg-gradient-to-r from-slate-50 to-white flex items-center gap-2">
      <lucide-icon [img]="FilterIcon" [size]="14" class="text-slate-400"></lucide-icon>
      <span class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Filters</span>
    </div>
    <div class="p-4">
      <form [formGroup]="filterForm" class="grid grid-cols-2 sm:grid-cols-4 gap-3">
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-slate-500">Role</label>
          <input type="text" placeholder="e.g. Frontend" formControlName="role"
                 class="px-3 py-2 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-slate-500">Location</label>
          <input type="text" placeholder="e.g. New York" formControlName="location"
                 class="px-3 py-2 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" />
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-slate-500">Work Mode</label>
          <select formControlName="workMode"
                  class="px-3 py-2 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
            <option value="">Any</option>
            <option value="REMOTE">Remote</option>
            <option value="ONSITE">Onsite</option>
            <option value="HYBRID">Hybrid</option>
          </select>
        </div>
        <div class="flex flex-col gap-1.5">
          <label class="text-xs font-medium text-slate-500">Sponsorship</label>
          <select formControlName="sponsorshipNeeded"
                  class="px-3 py-2 border border-slate-200 rounded-xl text-sm bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition">
            <option [ngValue]="null">Any</option>
            <option [ngValue]="true">Required</option>
            <option [ngValue]="false">Not needed</option>
          </select>
        </div>
      </form>
    </div>
  </div>

  <!-- Sort + Count -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
    <p class="text-sm text-slate-500">
      <span *ngIf="!loading">
        <strong class="text-slate-800 font-semibold">{{ matches.length }}</strong> result(s) found
      </span>
    </p>
    <div class="flex items-center gap-2 bg-slate-100 rounded-xl p-1">
      <button type="button" (click)="setSort('score')"
              [class]="sort==='score' ? 'flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg bg-white text-xs font-semibold text-indigo-700 shadow-sm' : 'flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:text-slate-700 transition'">
        <lucide-icon [img]="TrendingUpIcon" [size]="12"></lucide-icon> Best Match
      </button>
      <button type="button" (click)="setSort('recent')"
              [class]="sort==='recent' ? 'flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg bg-white text-xs font-semibold text-indigo-700 shadow-sm' : 'flex items-center gap-1.5 px-3.5 py-1.5 rounded-lg text-xs font-medium text-slate-500 hover:text-slate-700 transition'">
        <lucide-icon [img]="ClockIcon" [size]="12"></lucide-icon> Most Recent
      </button>
    </div>
  </div>

  <!-- Loading Skeleton -->
  <div *ngIf="loading" class="flex flex-col gap-3">
    <div *ngFor="let i of [1,2,3]" class="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm animate-pulse">
      <div class="flex justify-between items-start gap-3 mb-3">
        <div class="flex-1">
          <div class="h-4 bg-slate-200 rounded w-2/5 mb-2"></div>
          <div class="h-3 bg-slate-100 rounded w-1/4"></div>
        </div>
        <div class="w-[52px] h-[52px] bg-slate-100 rounded-full"></div>
      </div>
      <div class="flex gap-2 mb-3">
        <div class="h-6 bg-slate-100 rounded-full w-16"></div>
        <div class="h-6 bg-slate-100 rounded-full w-20"></div>
        <div class="h-6 bg-slate-100 rounded-full w-14"></div>
      </div>
      <div class="h-px bg-slate-100 my-3"></div>
      <div class="flex justify-between">
        <div class="h-4 bg-slate-100 rounded w-24"></div>
        <div class="h-7 bg-slate-100 rounded-xl w-28"></div>
      </div>
    </div>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="flex items-center gap-3 bg-red-50 border border-red-200 rounded-2xl p-4 text-sm text-red-600">
    <lucide-icon [img]="AlertIcon" [size]="18" class="shrink-0 text-red-500"></lucide-icon>
    <div>
      <p class="font-semibold">Failed to load matches</p>
      <p class="text-xs text-red-500 mt-0.5">{{ error }}</p>
    </div>
  </div>

  <!-- Empty -->
  <div *ngIf="!loading && !error && matches.length === 0"
       class="bg-white rounded-2xl border border-slate-200 p-12 text-center">
    <div class="w-14 h-14 bg-slate-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
      <lucide-icon [img]="SearchIcon" [size]="24" class="text-slate-400"></lucide-icon>
    </div>
    <p class="text-slate-700 font-semibold mb-1">No matches found</p>
    <p class="text-sm text-slate-400">Try widening your filters or adding more skills to your profile.</p>
  </div>

  <!-- Cards -->
  <div *ngIf="!loading" class="flex flex-col gap-3">
    <app-match-card *ngFor="let match of matches"
      [match]="match"
      [alreadyApplied]="appliedListingIds.has(match.listingId)"
      (applyClicked)="onApply($event)">
    </app-match-card>
  </div>

  <!-- Pagination -->
  <div class="flex items-center justify-center gap-3 mt-6" *ngIf="totalPages > 1">
    <button (click)="prevPage()" [disabled]="page===0"
            class="flex items-center gap-1.5 px-4 py-2 border border-slate-200 rounded-xl bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition text-sm font-medium shadow-sm">
      <lucide-icon [img]="ChevronLeftIcon" [size]="14"></lucide-icon> Prev
    </button>
    <div class="flex items-center gap-1.5 px-4 py-2 bg-indigo-50 border border-indigo-100 rounded-xl">
      <span class="text-sm font-semibold text-indigo-700">{{ page+1 }}</span>
      <span class="text-slate-400 text-sm">/</span>
      <span class="text-sm text-slate-500">{{ totalPages }}</span>
    </div>
    <button (click)="nextPage()" [disabled]="page+1>=totalPages"
            class="flex items-center gap-1.5 px-4 py-2 border border-slate-200 rounded-xl bg-white text-slate-600 hover:bg-slate-50 disabled:opacity-40 disabled:cursor-not-allowed transition text-sm font-medium shadow-sm">
      Next <lucide-icon [img]="ChevronRightIcon" [size]="14"></lucide-icon>
    </button>
  </div>
</div>
