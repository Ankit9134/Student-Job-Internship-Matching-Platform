<h2 class="text-2xl font-bold text-gray-900 mb-5">Your Matches</h2>

<form [formGroup]="filterForm" class="flex flex-wrap gap-3 mb-4">
  <input type="text" placeholder="Role (e.g. frontend)" formControlName="role"
         class="flex-1 min-w-36 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
  <input type="text" placeholder="Location" formControlName="location"
         class="flex-1 min-w-36 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900" />
  <select formControlName="workMode"
          class="flex-1 min-w-36 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
    <option value="">Any work mode</option>
    <option value="REMOTE">Remote</option>
    <option value="ONSITE">Onsite</option>
    <option value="HYBRID">Hybrid</option>
  </select>
  <select formControlName="sponsorshipNeeded"
          class="flex-1 min-w-36 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900">
    <option [ngValue]="null">Any sponsorship</option>
    <option [ngValue]="true">Sponsorship required</option>
    <option [ngValue]="false">No sponsorship needed</option>
  </select>
</form>

<div class="flex items-center gap-2 mb-5 text-sm text-gray-500">
  <span>Sort by:</span>
  <button type="button" (click)="setSort('score')"
          [class]="sort === 'score' ? 'px-3 py-1 rounded-lg bg-gray-900 text-white text-xs font-medium' : 'px-3 py-1 rounded-lg border border-gray-300 bg-white text-xs font-medium hover:bg-gray-50'">
    Match score
  </button>
  <button type="button" (click)="setSort('recent')"
          [class]="sort === 'recent' ? 'px-3 py-1 rounded-lg bg-gray-900 text-white text-xs font-medium' : 'px-3 py-1 rounded-lg border border-gray-300 bg-white text-xs font-medium hover:bg-gray-50'">
    Most recent
  </button>
</div>

<p *ngIf="loading" class="text-sm text-gray-500">Loading matches...</p>
<p *ngIf="error" class="text-sm text-red-600">{{ error }}</p>
<p *ngIf="!loading && !error && matches.length === 0" class="text-sm text-gray-500">
  No listings match your current filters — try widening them.
</p>

<div *ngIf="!loading" class="flex flex-col gap-3">
  <app-match-card
    *ngFor="let match of matches"
    [match]="match"
    [alreadyApplied]="appliedListingIds.has(match.listingId)"
    (applyClicked)="onApply($event)">
  </app-match-card>
</div>

<div class="flex items-center justify-center gap-4 mt-6 text-sm" *ngIf="totalPages > 1">
  <button (click)="prevPage()" [disabled]="page === 0"
          class="px-4 py-1.5 border border-gray-300 rounded-lg bg-white hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
    Previous
  </button>
  <span class="text-gray-600">Page {{ page + 1 }} of {{ totalPages }}</span>
  <button (click)="nextPage()" [disabled]="page + 1 >= totalPages"
          class="px-4 py-1.5 border border-gray-300 rounded-lg bg-white hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed">
    Next
  </button>
</div>
